# .github/workflows/deploy.yml
# Chạy khi push main. Test → Build → Push GHCR → Deploy VPS qua SSH.
# backend-ci.yml / frontend-ci.yml vẫn lo test trên feature branch & PR — không đổi.

name: Build and Deploy Event

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  # ─── Backend: test → build → push → (deploy chờ ở job cuối) ──────────────
  build-backend:
    name: Test → Build → Push GHCR (backend)
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Run full test suite (verify)
        run: bash ./mvnw -B verify
        env:
          TESTCONTAINERS_RYUK_DISABLED: "false"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push event-backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/event-backend:latest
            ghcr.io/${{ github.repository_owner }}/event-backend:${{ github.sha }}

  # ─── Frontend: lint/build check → build image → push ─────────────────────
  build-frontend:
    name: Build → Push GHCR (frontend)
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push event-frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/event-frontend:latest

  # ─── Deploy VPS ────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    needs: [changes, build-backend, build-frontend]
    if: always() && (needs.build-backend.result == 'success' || needs.build-frontend.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/deploy/app
            docker compose pull event-backend event-frontend
            docker compose up -d event-backend event-frontend
            docker image prune -f